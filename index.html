h+=’<div class="main">’;var vTitle=activeView===‘today’?todayDay+”‘s Tasks”:activeView===‘weekly’?selectedDay:FREQ_LABELS[activeView]||activeView;
h+=’<div class="view-header"><div><h2>’+vTitle+’</h2><div class="sub">’+vD+’ of ‘+vT+’ complete</div></div><div class="ring" style="background:conic-gradient(#5B7A58 '+(vP*3.6)+'deg, #E8E6E1 0deg)"><div class="ring-inner">’+vP+’%</div></div></div>’;
h+=’<div class="progress-bar"><div class="progress-fill" style="width:'+vP+'%"></div></div>’;
if(vt.length===0){h+=’<div class="empty"><div style="font-size:32px;margin-bottom:8px">\u2728</div><div style="font-size:14px">No tasks here!</div></div>’}else{h+=’<div class="task-list">’;for(var vi=0;vi<vt.length;vi++){var tk=vt[vi],dn=isC(tk.id,tk._pk),tc=FREQ_COLORS[tk._freq];h+=’<div class="task-card'+(dn?' done':'')+'" onclick="tC(\''+tk.id+'\',\''+tk._pk+'\')"><div class="checkbox'+(dn?' checked':'')+'" style="border-color:'+(dn?'#5B7A58':tc.border)+'"></div><div class="task-info"><div class="task-name'+(dn?' struck':'')+'">’+esc(tk.name)+’</div><div class="task-tags"><span class="tag" style="background:'+tc.tag+';color:'+tc.accent+'">’+FREQ_LABELS[tk._freq]+’</span><span class="tag tag-zone">’+esc(tk.zone)+’</span></div></div>’;if(tk.custom)h+=’<button class=“task-delete” onclick=“event.stopPropagation();editingTask={id:'’+tk.id+’',name:'’+esc(tk.name).replace(/’/g,”\’”)+’',zone:'’+tk.zone+’',_freq:'’+tk._freq+’',_day:'’+(tk._day||’’)+’'};render()”>\u2022\u2022\u2022</button>’;h+=’</div>’}h+=’</div>’}
if(activeView===‘today’){var exs=[‘monthly’,‘quarterly’,‘biannual’,‘annual’];for(var ei=0;ei<exs.length;ei++){var ef=exs[ei],ep=gP(ef),ec=FREQ_COLORS[ef],epk;if(ef===‘monthly’)epk=gMK();else if(ef===‘quarterly’)epk=gQK();else if(ef===‘biannual’)epk=gHK();else epk=gYK();var eft=tasks[ef].filter(function(t){return zoneFilter===‘All’||t.zone===zoneFilter}),pnd=eft.filter(function(t){return!isC(t.id,epk)});if(!pnd.length)continue;h+=’<div class="section-title"><h3 style="color:'+ec.accent+'">’+FREQ_LABELS[ef]+’ \u2014 ‘+ep.done+’/’+ep.total+’</h3><span style="font-size:11px;color:'+ec.accent+';font-weight:500">’+ep.pct+’%</span></div><div class="section-tasks">’;var sw=pnd.slice(0,3);for(var si=0;si<sw.length;si++)h+=’<div class="mini-task" style="background:'+ec.bg+';border:1px solid '+ec.border+'30" onclick="tC(\''+sw[si].id+'\',\''+epk+'\')"><div class="mini-checkbox" style="border-color:'+ec.border+'"></div><span>’+esc(sw[si].name)+’</span></div>’;if(pnd.length>3)h+=’<button class="view-more" style="color:'+ec.accent+'" onclick="activeView=\''+ef+'\';render()">+’+(pnd.length-3)+’ more \u2192 View all</button>’;h+=’</div>’}}
h+=’</div>’;
if(showAddModal){h+=’<div class="modal-overlay" onclick="showAddModal=false;render()"><div class="modal" onclick="event.stopPropagation()"><h3>Add New Task</h3><div class="field"><span class="field-label">Task Name</span><input id="nTN" placeholder="e.g., Wipe down pantry shelves" value="'+esc(newTask.name)+'" oninput="newTask.name=this.value"></div><div class="field-row"><div class="field"><span class="field-label">Frequency</span><select onchange="newTask.frequency=this.value;render()">’;for(var fk in FREQ_LABELS)h+=’<option value=”’+fk+’”’+(newTask.frequency===fk?’ selected’:’’)+’>’+FREQ_LABELS[fk]+’</option>’;h+=’</select></div><div class="field"><span class="field-label">Zone</span><select onchange="newTask.zone=this.value">’;for(var zj=0;zj<ZONES.length;zj++){if(ZONES[zj]===‘All’)continue;h+=’<option’+(newTask.zone===ZONES[zj]?’ selected’:’’)+’>’+ZONES[zj]+’</option>’}h+=’</select></div></div>’;if(newTask.frequency===‘weekly’){h+=’<div class="field"><span class="field-label">Day</span><div class="day-pick">’;for(var dj=0;dj<7;dj++)h+=’<button class="'+(newTask.day===DAYS[dj]?'sel':'')+'" onclick="newTask.day=\''+DAYS[dj]+'\';render()">’+DAY_SHORT[dj]+’</button>’;h+=’</div></div>’}h+=’<div class="modal-btns"><button class="btn-cancel" onclick="showAddModal=false;render()">Cancel</button><button class="btn-confirm" onclick="addTask()">Add Task</button></div></div></div>’}
if(editingTask){h+=’<div class="modal-overlay" onclick="editingTask=null;render()"><div class="modal" onclick="event.stopPropagation()" style="max-width:340px;text-align:center"><h3 style="font-size:16px;font-family:DM Sans,sans-serif;font-weight:600">’+esc(editingTask.name)+’</h3><p style="font-size:13px;color:#8B8680;margin-bottom:20px">’+esc(editingTask.zone)+’</p><button class="btn-delete" onclick="delTask(\''+editingTask.id+'\',\''+editingTask._freq+'\',\''+editingTask._day+'\')">Delete Task</button><button class="btn-cancel" style="width:100%;padding:12px;border-radius:10px" onclick="editingTask=null;render()">Cancel</button></div></div>’}
document.getElementById(‘app’).innerHTML=h;if(showAddModal){var inp=document.getElementById(‘nTN’);if(inp)inp.focus()}}
try{if(document.readyState===‘loading’)document.addEventListener(‘DOMContentLoaded’,render);else render()}catch(e){document.getElementById(‘app’).innerHTML=’<div style="padding:40px;color:red;">Error: ‘+e.message+’</div>’}
</script>

</body>
