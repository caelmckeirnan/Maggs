function sGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function sSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var tasks = sGet(‘hcp-t4’) || JSON.parse(JSON.stringify(DT));
var comp = sGet(‘hcp-c4’) || {};
var aView = ‘today’;
var selDay = gTD();
var zFilt = ‘All’;
var sSets = false;
var sAdd = false;
var eTask = null;

function save(){sSet(‘hcp-t4’,tasks);sSet(‘hcp-c4’,comp);}
function gTD(){var d=new Date().getDay();return DAYS[d===0?6:d-1];}
function gDS(){return new Date().toISOString().split(‘T’)[0];}
function gWK(){var d=new Date(),dy=d.getDay(),df=d.getDate()-dy+(dy===0?-6:1);return new Date(new Date(d).setDate(df)).toISOString().split(‘T’)[0];}
function gMK(){var d=new Date();return d.getFullYear()+’-’+String(d.getMonth()+1).padStart(2,‘0’);}
function gQK(){var d=new Date();return d.getFullYear()+’-Q’+Math.ceil((d.getMonth()+1)/3);}
function gHK(){var d=new Date();return d.getFullYear()+’-H’+(d.getMonth()<6?1:2);}
function gYK(){return ‘’+new Date().getFullYear();}

function isC(id,pk){return !!comp[id+’:’+pk];}

function tgl(id,pk){
var k=id+’:’+pk;
if(comp[k]) delete comp[k]; else comp[k]=Date.now();
save();render();
}

function gVT(){
var r=[],ds=gDS(),wk=gWK(),mk=gMK(),qk=gQK(),hk=gHK(),yk=gYK(),td=gTD();
if(aView===‘today’){
for(var i=0;i<tasks.daily.length;i++) r.push({id:tasks.daily[i].id,name:tasks.daily[i].name,zone:tasks.daily[i].zone,custom:tasks.daily[i].custom,_f:‘daily’,_p:ds});
var wt=tasks.weekly[td]||[];
for(var j=0;j<wt.length;j++) r.push({id:wt[j].id,name:wt[j].name,zone:wt[j].zone,custom:wt[j].custom,_f:‘weekly’,_p:wk});
} else if(aView===‘daily’){
for(var i=0;i<tasks.daily.length;i++) r.push({id:tasks.daily[i].id,name:tasks.daily[i].name,zone:tasks.daily[i].zone,custom:tasks.daily[i].custom,_f:‘daily’,_p:ds});
} else if(aView===‘weekly’){
var wt=tasks.weekly[selDay]||[];
for(var j=0;j<wt.length;j++) r.push({id:wt[j].id,name:wt[j].name,zone:wt[j].zone,custom:wt[j].custom,_f:‘weekly’,_p:wk,_d:selDay});
} else {
var pks={monthly:mk,quarterly:qk,biannual:hk,annual:yk};
var arr=tasks[aView]||[];
for(var i=0;i<arr.length;i++) r.push({id:arr[i].id,name:arr[i].name,zone:arr[i].zone,custom:arr[i].custom,_f:aView,_p:pks[aView]});
}
if(zFilt!==‘All’) r=r.filter(function(t){return t.zone===zFilt;});
return r;
}

function gPr(f){
var list=[],pk=’’;
if(f===‘daily’){list=tasks.daily;pk=gDS();}
else if(f===‘weekly’){for(var i=0;i<DAYS.length;i++){var w=tasks.weekly[DAYS[i]]||[];for(var j=0;j<w.length;j++)list.push(w[j]);}pk=gWK();}
else if(f===‘monthly’){list=tasks.monthly;pk=gMK();}
else if(f===‘quarterly’){list=tasks.quarterly;pk=gQK();}
else if(f===‘biannual’){list=tasks.biannual;pk=gHK();}
else{list=tasks.annual;pk=gYK();}
var t=list.length,d=0;
for(var i=0;i<list.length;i++) if(isC(list[i].id,pk)) d++;
return {total:t,done:d,pct:t?Math.round(d/t*100):0};
}

function addT(){
if(!nTask.name.trim())return;
var id=‘c-’+Date.now();
var t={id:id,name:nTask.name.trim(),zone:nTask.zone,custom:true};
if(nTask.frequency===‘daily’) tasks.daily.push(t);
else if(nTask.frequency===‘weekly’){if(!tasks.weekly[nTask.day])tasks.weekly[nTask.day]=[];tasks.weekly[nTask.day].push(t);}
else tasks[nTask.frequency].push(t);
save();nTask={name:’’,zone:‘Kitchen’,frequency:‘daily’,day:‘Monday’};sAdd=false;render();
}

function delT(id,f,day){
if(f===‘daily’) tasks.daily=tasks.daily.filter(function(t){return t.id!==id;});
else if(f===‘weekly’&&day) tasks.weekly[day]=(tasks.weekly[day]||[]).filter(function(t){return t.id!==id;});
else tasks[f]=tasks[f].filter(function(t){return t.id!==id;});
save();eTask=null;render();
}

function resP(){
var pk;
if(aView===‘daily’)pk=gDS();else if(aView===‘weekly’)pk=gWK();else if(aView===‘monthly’)pk=gMK();else if(aView===‘quarterly’)pk=gQK();else if(aView===‘biannual’)pk=gHK();else pk=gYK();
var keys=Object.keys(comp);
for(var i=0;i<keys.length;i++){if(keys[i].indexOf(’:’+pk)===keys[i].length-pk.length-1) delete comp[keys[i]];}
save();render();
}

for(var i=0;i<ZONES.length;i++){if(ZONES[i]===‘All’)continue;h+=’<option’+(nTask.zone===ZONES[i]?’ selected’:’’)+’>’+ZONES[i]+’</option>’;}
h+=’</select></div></div>’;
if(nTask.frequency===‘weekly’){
h+=’<div class="fd"><span class="fl">Day</span><div class="dp">’;
for(var i=0;i<7;i++) h+=’<button class="'+(nTask.day===DAYS[i]?'sl':'')+'" onclick="nTask.day=\''+DAYS[i]+'\';render()">’+DSHORT[i]+’</button>’;
h+=’</div></div>’;
}
h+=’<div class="mb"><button class="bc" onclick="sAdd=false;render()">Cancel</button><button class="bf" onclick="addT()">Add Task</button></div>’;
h+=’</div></div>’;
}

// Edit modal
if(eTask){
h+=’<div class="mo" onclick="eTask=null;render()"><div class="md" onclick="event.stopPropagation()" style="max-width:340px;text-align:center">’;
h+=’<h3 style="font-size:16px;font-family:DM Sans,sans-serif;font-weight:600">’+esc(eTask.name)+’</h3>’;
h+=’<p style="font-size:13px;color:#8B8680;margin-bottom:20px">’+esc(eTask.zone)+’</p>’;
h+=’<button class="bd" onclick="delT(\''+eTask.id+'\',\''+eTask._f+'\',\''+eTask._d+'\')">Delete Task</button>’;
h+=’<button class="bc" style="width:100%;padding:12px;border-radius:10px" onclick="eTask=null;render()">Cancel</button>’;
h+=’</div></div>’;
}

document.getElementById(‘app’).innerHTML=h;
if(sAdd){var inp=document.getElementById(‘nti’);if(inp)inp.focus();}
}

try{
if(document.readyState===‘loading’){document.addEventListener(‘DOMContentLoaded’,render);}
else{render();}
}catch(e){
document.getElementById(‘app’).innerHTML=’<div style="padding:40px;color:red;font-size:16px">Error: ‘+e.message+’</div>’;
}
</script>

</body>
</html>
