<title>Home Care Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#FAFAF7;color:#2D2D2D;min-height:100vh;font-size:14px}
button,input,select{font-family:inherit;font-size:inherit}

.hd{background:#fff;border-bottom:1px solid #E8E6E1;padding:16px 16px 12px;position:sticky;top:0;z-index:50}
.hd-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.hd h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.hd .dt{font-size:12px;color:#8B8680;margin-top:2px}
.hd-btns{display:flex;gap:6px}
.hd-btns button{border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:600;border:none}
.btn-gear{background:#F0EFEC;color:#6B6560}
.btn-text{background:#007AFF;color:#fff}
.btn-add{background:#5B7A58;color:#fff}

.prog{display:flex;gap:3px;margin-bottom:12px}
.prog-c{flex:1;border-radius:6px;padding:5px 3px;text-align:center}
.prog-c .pv{font-size:13px;font-weight:700}
.prog-c .pl{font-size:7px;text-transform:uppercase;letter-spacing:0.3px;opacity:0.7}

.tabs{display:flex;gap:3px;flex-wrap:wrap}
.tabs button{padding:5px 10px;border-radius:16px;border:1px solid #E0DDD8;background:transparent;color:#6B6560;font-size:11px;font-weight:500;cursor:pointer}
.tabs button.on{border-color:#5B7A58;background:#5B7A58;color:#fff}

.filt{background:#fff;border-bottom:1px solid #E8E6E1;padding:10px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filt label{font-size:11px;color:#8B8680;font-weight:600;text-transform:uppercase}
.filt select{padding:5px 10px;border-radius:6px;border:1px solid #E0DDD8;font-size:12px;background:#FAFAF7}
.filt .rst{padding:5px 12px;border-radius:6px;border:1px solid #E8C4C4;background:#FFF5F5;color:#8B4D4D;font-size:11px;cursor:pointer;font-weight:600}

.days{background:#fff;border-bottom:1px solid #E8E6E1;padding:10px 16px;display:flex;gap:3px}
.days button{flex:1;padding:7px 2px;border-radius:6px;border:1px solid #E8E6E1;background:transparent;color:#6B6560;font-size:10px;font-weight:500;cursor:pointer;text-align:center}
.days button.on{border:2px solid #4A6D8C;background:#4A6D8C;color:#fff;font-weight:700}
.days button.now:not(.on){background:#EFF3F8;color:#4A6D8C}

.main{padding:14px 16px 100px}
.vhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.vhdr h2{font-size:17px;font-weight:600}
.vhdr .sub{font-size:11px;color:#8B8680;margin-top:1px}
.ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.ring-in{width:34px;height:34px;border-radius:50%;background:#FAFAF7;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#5B7A58}
.pbar{height:3px;background:#E8E6E1;border-radius:3px;margin-bottom:16px}
.pfill{height:100%;border-radius:3px;background:#5B7A58}

.tlist{display:flex;flex-direction:column;gap:5px}
.tcard{background:#fff;border:1px solid rgba(0,0,0,0.06);border-radius:9px;padding:11px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-user-select:none;user-select:none}
.tcard.done{background:#F5F5F2;opacity:0.5}
.tcard:active{opacity:0.8}
.chk{width:20px;height:20px;border-radius:5px;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chk.on{background:#5B7A58;border-color:#5B7A58}
.chk.on::after{content:’\2713’;color:#fff;font-size:11px;font-weight:bold}
.tinfo{flex:1;min-width:0}
.tname{font-size:13px;font-weight:500;line-height:1.3}
.tname.struck{text-decoration:line-through;color:#8B8680}
.ttags{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap}
.tag{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:500}
.tag-z{background:#F0EFEC;color:#6B6560}
.tbtn{background:none;border:none;cursor:pointer;font-size:16px;color:#B0ACA6;padding:2px 4px}

.sec-hd{display:flex;justify-content:space-between;align-items:center;margin:20px 0 6px;padding:0 2px}
.sec-hd h3{font-size:13px;font-weight:600}
.sec-list{display:flex;flex-direction:column;gap:3px}
.mini{border-radius:7px;padding:9px 10px;display:flex;align-items:center;gap:8px;cursor:pointer}
.mini-chk{width:16px;height:16px;border-radius:4px;border:2px solid;flex-shrink:0}
.mini span{font-size:12px}
.vmore{background:none;border:none;cursor:pointer;font-size:11px;font-weight:500;padding:3px 0}

.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:380px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:20px;font-weight:700;margin-bottom:16px}
.fld{margin-bottom:14px}
.fld-l{font-size:10px;color:#8B8680;text-transform:uppercase;letter-spacing:0.8px;display:block;margin-bottom:4px;font-weight:600}
.fld input,.fld select{width:100%;padding:9px 12px;border-radius:7px;border:1px solid #E0DDD8;font-size:13px;outline:none}
.fld-r{display:flex;gap:10px}
.fld-r>div{flex:1}
.dpk{display:flex;gap:3px}
.dpk button{flex:1;padding:7px 2px;border-radius:6px;border:1px solid #E0DDD8;background:transparent;color:#6B6560;font-size:10px;font-weight:500;cursor:pointer}
.dpk button.on{border:2px solid #4A6D8C;background:#4A6D8C;color:#fff}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mbtns button{flex:1;padding:11px;border-radius:9px;font-size:13px;cursor:pointer;font-weight:600}
.mbtn-c{border:1px solid #E0DDD8;background:transparent;color:#6B6560}
.mbtn-ok{border:none;background:#5B7A58;color:#fff}
.mbtn-del{width:100%;padding:11px;border-radius:9px;border:1px solid #E8C4C4;background:#FFF5F5;font-size:13px;cursor:pointer;color:#8B4D4D;font-weight:600;margin-bottom:6px}

.sms-modal .task-pick{max-height:40vh;overflow-y:auto;border:1px solid #E8E6E1;border-radius:8px;margin-bottom:12px}
.sms-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid #F0EFEC;cursor:pointer}
.sms-row:last-child{border-bottom:none}
.sms-chk{width:18px;height:18px;border-radius:4px;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sms-chk.on{background:#007AFF;border-color:#007AFF}
.sms-chk.on::after{content:’\2713’;color:#fff;font-size:10px;font-weight:bold}
.sms-name{font-size:12px;flex:1}
.sms-zone{font-size:10px;color:#8B8680}
.sms-phone{margin-bottom:12px}
.sms-phone input{width:100%;padding:9px 12px;border-radius:7px;border:1px solid #E0DDD8;font-size:13px;outline:none}
.sms-send{width:100%;padding:12px;border-radius:9px;border:none;background:#007AFF;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.sms-send:disabled{opacity:0.4}
.sms-sel-all{font-size:11px;color:#007AFF;cursor:pointer;background:none;border:none;font-weight:600;padding:4px 0;margin-bottom:6px}

/* –– STORAGE –– */
function sG(k){try{var v=localStorage.getItem(k);if(v){return JSON.parse(v);}return null;}catch(e){return null;}}
function sS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

/* –– STATE –– */
var tasks = sG(“hcp5t”) || JSON.parse(JSON.stringify(DTASKS));
var comp = sG(“hcp5c”) || {};
var state = {view:“today”,day:todayName(),zone:“All”,sets:false,addM:false,smsM:false,editT:null};
var nT = {name:””,zone:“Kitchen”,freq:“daily”,day:“Monday”};
var smsSel = {};
var smsPhone = sG(“hcp5ph”) || “”;

function save(){sS(“hcp5t”,tasks);sS(“hcp5c”,comp);}

/* –– DATE HELPERS –– */
function todayName(){var d=new Date().getDay();return DAYS[d===0?6:d-1];}
function dateKey(){return new Date().toISOString().split(“T”)[0];}
function weekKey(){
var d=new Date();
var day=d.getDay();
var diff=d.getDate()-day+(day===0?-6:1);
var mon=new Date(d.getFullYear(),d.getMonth(),diff);
return mon.toISOString().split(“T”)[0];
}
function monthKey(){var d=new Date();return d.getFullYear()+”-”+(d.getMonth()<9?“0”:””)+(d.getMonth()+1);}
function quarterKey(){var d=new Date();return d.getFullYear()+”-Q”+Math.ceil((d.getMonth()+1)/3);}
function halfKey(){var d=new Date();return d.getFullYear()+”-H”+(d.getMonth()<6?1:2);}
function yearKey(){return “”+new Date().getFullYear();}

function isDone(id,pk){return comp[id+”:”+pk]===1;}
function toggle(id,pk){var k=id+”:”+pk;if(comp[k]){delete comp[k];}else{comp[k]=1;}save();render();}

/* –– GET TASKS –– */
function viewTasks(){
var r=[];
var dk=dateKey(),wk=weekKey(),mk=monthKey(),qk=quarterKey(),hk=halfKey(),yk=yearKey();
var td=todayName();
var v=state.view;
var i;
if(v===“today”){
for(i=0;i<tasks.daily.length;i++){var t=tasks.daily[i];r.push({id:t.id,name:t.name,zone:t.zone,cust:t.cust,_f:“daily”,_p:dk});}
var wl=tasks.weekly[td]||[];
for(i=0;i<wl.length;i++){var t=wl[i];r.push({id:t.id,name:t.name,zone:t.zone,cust:t.cust,_f:“weekly”,_p:wk});}
}else if(v===“daily”){
for(i=0;i<tasks.daily.length;i++){var t=tasks.daily[i];r.push({id:t.id,name:t.name,zone:t.zone,cust:t.cust,_f:“daily”,_p:dk});}
}else if(v===“weekly”){
var wl=tasks.weekly[state.day]||[];
for(i=0;i<wl.length;i++){var t=wl[i];r.push({id:t.id,name:t.name,zone:t.zone,cust:t.cust,_f:“weekly”,_p:wk,_d:state.day});}
}else{
var pks={monthly:mk,quarterly:qk,biannual:hk,annual:yk};
var arr=tasks[v]||[];
for(i=0;i<arr.length;i++){var t=arr[i];r.push({id:t.id,name:t.name,zone:t.zone,cust:t.cust,_f:v,_p:pks[v]});}
}
if(state.zone!==“All”){r=r.filter(function(x){return x.zone===state.zone;});}
return r;
}

function getProgress(f){
var list=[],pk=””,i;
if(f===“daily”){list=tasks.daily;pk=dateKey();}
else if(f===“weekly”){for(i=0;i<DAYS.length;i++){var w=tasks.weekly[DAYS[i]]||[];for(var j=0;j<w.length;j++){list.push(w[j]);}}pk=weekKey();}
else if(f===“monthly”){list=tasks.monthly;pk=monthKey();}
else if(f===“quarterly”){list=tasks.quarterly;pk=quarterKey();}
else if(f===“biannual”){list=tasks.biannual;pk=halfKey();}
else{list=tasks.annual;pk=yearKey();}
var total=list.length,done=0;
for(i=0;i<list.length;i++){if(isDone(list[i].id,pk)){done++;}}
return {total:total,done:done,pct:total?Math.round(done/total*100):0};
}

/* –– ACTIONS –– */
function addTask(){
if(!nT.name.trim()){return;}
var id=“c”+Date.now();
var t={id:id,name:nT.name.trim(),zone:nT.zone,cust:true};
if(nT.freq===“daily”){tasks.daily.push(t);}
else if(nT.freq===“weekly”){if(!tasks.weekly[nT.day]){tasks.weekly[nT.day]=[];}tasks.weekly[nT.day].push(t);}
else{tasks[nT.freq].push(t);}
save();nT={name:””,zone:“Kitchen”,freq:“daily”,day:“Monday”};state.addM=false;render();
}
function delTask(id,f,day){
if(f===“daily”){tasks.daily=tasks.daily.filter(function(t){return t.id!==id;});}
else if(f===“weekly”&&day){tasks.weekly[day]=(tasks.weekly[day]||[]).filter(function(t){return t.id!==id;});}
else{tasks[f]=tasks[f].filter(function(t){return t.id!==id;});}
save();state.editT=null;render();
}
function resetPeriod(){
var pk;
var v=state.view;
if(v===“daily”){pk=dateKey();}else if(v===“weekly”){pk=weekKey();}else if(v===“monthly”){pk=monthKey();}else if(v===“quarterly”){pk=quarterKey();}else if(v===“biannual”){pk=halfKey();}else{pk=yearKey();}
var keys=Object.keys(comp);
var suffix=”:”+pk;
for(var i=0;i<keys.length;i++){
if(keys[i].length>=suffix.length&&keys[i].substring(keys[i].length-suffix.length)===suffix){delete comp[keys[i]];}
}
save();render();
}

/* –– SMS –– */
function openSms(){
var vt=viewTasks();
smsSel={};
for(var i=0;i<vt.length;i++){
if(!isDone(vt[i].id,vt[i]._p)){smsSel[vt[i].id]=true;}
}
state.smsM=true;
render();
}
function toggleSms(id){if(smsSel[id]){delete smsSel[id];}else{smsSel[id]=true;}render();}
function toggleAllSms(){
var vt=viewTasks();
var allOn=true;
for(var i=0;i<vt.length;i++){if(!smsSel[vt[i].id]){allOn=false;break;}}
if(allOn){smsSel={};}else{for(var i=0;i<vt.length;i++){smsSel[vt[i].id]=true;}}
render();
}
function sendSms(){
var vt=viewTasks();
var lines=[];
for(var i=0;i<vt.length;i++){
if(smsSel[vt[i].id]){lines.push(”- “+vt[i].name+” [”+vt[i].zone+”]”);}
}
if(lines.length===0){return;}
var phone=(window.smsPhone||””).trim();
sS(“hcp5ph”,phone);
var body=“Cleaning Tasks:\n\n”+lines.join(”\n”);
var url=“sms:”+encodeURIComponent(phone)+”&body=”+encodeURIComponent(body);
window.location.href=url;
}

/* –– ESCAPE –– */
function esc(s){
return s.replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”).replace(/’/g,”'”);
}

/* –– RENDER –– */
function render(){
var today=new Date();
var td=todayName();
var vt=viewTasks();
var vDone=0;
for(var i=0;i<vt.length;i++){if(isDone(vt[i].id,vt[i]._p)){vDone++;}}
var vTotal=vt.length;
var vPct=vTotal?Math.round(vDone/vTotal*100):0;
var h=””;

// Header
h+=’<div class="hd"><div class="hd-top"><div>’;
h+=’<h1>Home Care Planner</h1>’;
h+=’<div class="dt">’+today.toLocaleDateString(“en-US”,{weekday:“long”,month:“long”,day:“numeric”,year:“numeric”})+’</div>’;
h+=’</div><div class="hd-btns">’;
h+=’<button class="btn-gear" onclick="state.sets=!state.sets;render()">⚙</button>’;
h+=’<button class="btn-text" onclick="openSms()">✉ Text</button>’;
h+=’<button class="btn-add" onclick="state.addM=true;render()">+ Add</button>’;
h+=’</div></div>’;

// Progress
h+=’<div class="prog">’;
var fks=[“daily”,“weekly”,“monthly”,“quarterly”,“biannual”,“annual”];
for(var i=0;i<fks.length;i++){
var f=fks[i],p=getProgress(f),c=FCOL[f];
h+=’<div class="prog-c" style="background:'+c.t+'"><div class="pv" style="color:'+c.a+'">’+p.pct+’%</div><div class="pl" style="color:'+c.a+'">’+FLBL[f]+’</div></div>’;
}
h+=’</div>’;

// Tabs
h+=’<div class="tabs">’;
var tbs=[[“today”,“Today”],[“daily”,“Daily”],[“weekly”,“Weekly”],[“monthly”,“Monthly”],[“quarterly”,“Quarterly”],[“biannual”,“Biannual”],[“annual”,“Annual”]];
for(var i=0;i<tbs.length;i++){
h+=’<button class=”’+(state.view===tbs[i][0]?“on”:””)+’” onclick=“state.view='’+tbs[i][0]+’';state.zone='All';render()”>’+tbs[i][1]+’</button>’;
}
h+=’</div></div>’;

// Settings
if(state.sets){
h+=’<div class="filt"><label>Zone:</label><select onchange="state.zone=this.value;render()">’;
for(var i=0;i<ZONES.length;i++){h+=’<option’+(state.zone===ZONES[i]?’ selected’:’’)+’>’+ZONES[i]+’</option>’;}
h+=’</select>’;
if(state.view!==“today”){h+=’<button class="rst" onclick="resetPeriod()">Reset Period</button>’;}
h+=’</div>’;
}

// Day selector
if(state.view===“weekly”){
h+=’<div class="days">’;
for(var i=0;i<7;i++){
var cls=””;
if(state.day===DAYS[i]){cls=“on”;}
else if(DAYS[i]===td){cls=“now”;}
h+=’<button class="'+cls+'" onclick="state.day=\''+DAYS[i]+'\';render()">’+DS[i]+’</button>’;
}
h+=’</div>’;
}

// Main
h+=’<div class="main">’;
var vTitle=state.view===“today”?td+”‘s Tasks”:state.view===“weekly”?state.day:(FLBL[state.view]||state.view);
h+=’<div class="vhdr"><div><h2>’+vTitle+’</h2><div class="sub">’+vDone+’ of ‘+vTotal+’ complete</div></div>’;
h+=’<div class="ring" style="background:conic-gradient(#5B7A58 '+Math.round(vPct*3.6)+'deg, #E8E6E1 0deg)"><div class="ring-in">’+vPct+’%</div></div></div>’;
h+=’<div class="pbar"><div class="pfill" style="width:'+vPct+'%"></div></div>’;

if(vt.length===0){
h+=’<div style="text-align:center;padding:40px 16px;color:#B0ACA6;font-size:13px">No tasks here!</div>’;
}else{
h+=’<div class="tlist">’;
for(var i=0;i<vt.length;i++){
var tk=vt[i];
var dn=isDone(tk.id,tk._p);
var c=FCOL[tk._f];
h+=’<div class=“tcard’+(dn?” done”:””)+’” onclick=“toggle('’+tk.id+’','’+tk._p+’')”>’;
h+=’<div class=“chk’+(dn?” on”:””)+’” style=“border-color:’+(dn?”#5B7A58”:c.b)+’”></div>’;
h+=’<div class="tinfo"><div class=“tname’+(dn?” struck”:””)+’”>’+esc(tk.name)+’</div>’;
h+=’<div class="ttags"><span class="tag" style="background:'+c.t+';color:'+c.a+'">’+FLBL[tk._f]+’</span>’;
h+=’<span class="tag tag-z">’+esc(tk.zone)+’</span></div></div>’;
if(tk.cust){
h+=’<button class=“tbtn” onclick=“event.stopPropagation();state.editT={id:'’+tk.id+’',name:'’+esc(tk.name).replace(/’/g,”\’”)+’',zone:'’+tk.zone+’',_f:'’+tk._f+’',_d:'’+(tk._d||’’)+’'};render()”>…</button>’;
}
h+=’</div>’;
}
h+=’</div>’;
}

// Today extras
if(state.view===“today”){
var exs=[“monthly”,“quarterly”,“biannual”,“annual”];
var pks={monthly:monthKey(),quarterly:quarterKey(),biannual:halfKey(),annual:yearKey()};
for(var ei=0;ei<exs.length;ei++){
var ef=exs[ei],ep=getProgress(ef),ec=FCOL[ef],epk=pks[ef];
var arr=tasks[ef]||[];
var pnd=[];
for(var j=0;j<arr.length;j++){
if(state.zone===“All”||arr[j].zone===state.zone){
if(!isDone(arr[j].id,epk)){pnd.push(arr[j]);}
}
}
if(pnd.length===0){continue;}
h+=’<div class="sec-hd"><h3 style="color:'+ec.a+'">’+FLBL[ef]+’ - ‘+ep.done+’/’+ep.total+’</h3>’;
h+=’<span style="font-size:10px;color:'+ec.a+';font-weight:600">’+ep.pct+’%</span></div>’;
h+=’<div class="sec-list">’;
var show=pnd.length>3?3:pnd.length;
for(var si=0;si<show;si++){
h+=’<div class="mini" style="background:'+ec.t+';border:1px solid '+ec.b+'40" onclick="toggle(\''+pnd[si].id+'\',\''+epk+'\')">’;
h+=’<div class="mini-chk" style="border-color:'+ec.b+'"></div>’;
h+=’<span>’+esc(pnd[si].name)+’</span></div>’;
}
if(pnd.length>3){
h+=’<button class="vmore" style="color:'+ec.a+'" onclick="state.view=\''+ef+'\';render()">+’+(pnd.length-3)+’ more</button>’;
}
h+=’</div>’;
}
}
h+=’</div>’;

// Add modal
if(state.addM){
h+=’<div class="overlay" onclick="state.addM=false;render()"><div class="modal" onclick="event.stopPropagation()">’;
h+=’<h3>Add New Task</h3>’;
h+=’<div class="fld"><span class="fld-l">Task Name</span><input id="ntinp" placeholder="e.g., Wipe down pantry shelves" value="'+esc(nT.name)+'" oninput="nT.name=this.value"></div>’;
h+=’<div class="fld-r"><div class="fld"><span class="fld-l">Frequency</span><select onchange="nT.freq=this.value;render()">’;
for(var i=0;i<fks.length;i++){h+=’<option value=”’+fks[i]+’”’+(nT.freq===fks[i]?’ selected’:’’)+’>’+FLBL[fks[i]]+’</option>’;}
h+=’</select></div><div class="fld"><span class="fld-l">Zone</span><select onchange="nT.zone=this.value">’;
for(var i=0;i<ZONES.length;i++){if(ZONES[i]===“All”){continue;}h+=’<option’+(nT.zone===ZONES[i]?’ selected’:’’)+’>’+ZONES[i]+’</option>’;}
h+=’</select></div></div>’;
if(nT.freq===“weekly”){
h+=’<div class="fld"><span class="fld-l">Day</span><div class="dpk">’;
for(var i=0;i<7;i++){h+=’<button class=”’+(nT.day===DAYS[i]?“on”:””)+’” onclick=“nT.day='’+DAYS[i]+’';render()”>’+DS[i]+’</button>’;}
h+=’</div></div>’;
}
h+=’<div class="mbtns"><button class="mbtn-c" onclick="state.addM=false;render()">Cancel</button><button class="mbtn-ok" onclick="addTask()">Add Task</button></div>’;
h+=’</div></div>’;
}

// Edit modal
if(state.editT){
var et=state.editT;
h+=’<div class="overlay" onclick="state.editT=null;render()"><div class="modal" onclick="event.stopPropagation()" style="max-width:320px;text-align:center">’;
h+=’<h3 style="font-size:15px">’+esc(et.name)+’</h3>’;
h+=’<p style="font-size:12px;color:#8B8680;margin-bottom:16px">’+esc(et.zone)+’</p>’;
h+=’<button class="mbtn-del" onclick="delTask(\''+et.id+'\',\''+et._f+'\',\''+et._d+'\')">Delete Task</button>’;
h+=’<button class="mbtn-c" style="width:100%;padding:11px;border-radius:9px" onclick="state.editT=null;render()">Cancel</button>’;
h+=’</div></div>’;
}

// SMS modal
if(state.smsM){
h+=’<div class="overlay" onclick="state.smsM=false;render()"><div class="modal sms-modal" onclick="event.stopPropagation()">’;
h+=’<h3>Text Tasks</h3>’;
h+=’<div class="sms-phone"><span class="fld-l">Phone Number (optional)</span><input type=“tel” placeholder=“e.g., 509-555-1234” value=”’+esc(window.smsPhone||””)+’” oninput=“window.smsPhone=this.value”></div>’;
h+=’<button class="sms-sel-all" onclick="toggleAllSms()">Select All / None</button>’;
h+=’<div class="task-pick">’;
for(var i=0;i<vt.length;i++){
var tk=vt[i];
var sel=smsSel[tk.id]?true:false;
h+=’<div class="sms-row" onclick="toggleSms(\''+tk.id+'\')">’;
h+=’<div class=“sms-chk’+(sel?” on”:””)+’”></div>’;
h+=’<div class="sms-name">’+esc(tk.name)+’</div>’;
h+=’<div class="sms-zone">’+esc(tk.zone)+’</div>’;
h+=’</div>’;
}
h+=’</div>’;
var selCount=Object.keys(smsSel).length;
h+=’<button class=“sms-send”’+(selCount===0?” disabled”:””)+’ onclick=“sendSms()”>Open Messages (’+selCount+’ tasks)</button>’;
h+=’<div class="mbtns"><button class="mbtn-c" style="width:100%" onclick="state.smsM=false;render()">Cancel</button></div>’;
h+=’</div></div>’;
}

document.getElementById(“app”).innerHTML=h;
if(state.addM){var inp=document.getElementById(“ntinp”);if(inp){inp.focus();}}
}

/* –– EXPOSE GLOBALS –– */
window.state=state;
window.nT=nT;
window.smsSel=smsSel;
window.smsPhone=smsPhone;
window.render=render;
window.toggle=toggle;
window.addTask=addTask;
window.delTask=delTask;
window.resetPeriod=resetPeriod;
window.openSms=openSms;
window.toggleSms=toggleSms;
window.toggleAllSms=toggleAllSms;
window.sendSms=sendSms;

/* –– INIT –– */
render();

})();
</script>

</body>
</html>
